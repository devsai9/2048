<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>2048</title>

        <style>@import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

            * {
                font-family: "Poppins", sans-serif !important;
            }
            
            body {
                background: #2f2f2f;
                color: #fff;
                margin: 0;
                padding: 0;
            }

            h1 {
                text-align: center;
                font-size: 3rem;
                margin-top: 0;

                position: absolute;
                left: 50%;
                transform: translateX(-50%);
            }

            .game-cont {
                width: 100vw;
                height: 100vh;

                display: flex;
                justify-content: center;
                align-items: center;
            }

            .game {
                width: 300px;
                height: 300px;
                display: grid;
                grid-template-rows: 1fr 1fr 1fr 1fr;
                grid-template-columns: 1fr 1fr 1fr 1fr;
                gap: 10px;
                background: #4f4f4f;
                padding: 10px;
                border-radius: 20px;
            }

            .tile {
                width: 100%;
                height: 100%;
                background: #757474;

                display: flex;
                justify-content: center;
                align-items: center;
                border-radius: 15px;

                font-size: 1.5rem;
                font-weight: bold;
            }

            .tile * {
                margin: 0;
                padding: 0;
            }
        </style>
    </head>
    <body>
        <h1>2048</h1>
        <div class="game-cont">
            <div class="game"></div>
        </div>

        <script>
            const moveDirections = Object.freeze({
                UP: 0,
                RIGHT: 1,
                DOWN: 2,
                LEFT: 3
            });

            const game = {
                DIM: 4,
                board: [],
                boardElem: document.querySelector(".game"),

                init() {
                    this.boardElem.style.gridTemplateRows = `repeat(${this.DIM}, 1fr)`;
                    this.boardElem.style.gridTemplateColumns = `repeat(${this.DIM}, 1fr)`;
                    this.board = Array(this.DIM * this.DIM).fill(null);

                    this.render(this.board);
                },

                spawnTile() {
                    const twoTileChance = 0.9;

                    const insVal = Math.random() < twoTileChance ? 2 : 4;

                    const ids = [];
                    for (let i = 0; i < this.board.length; i++) {
                        if (this.board[i] == null) ids.push(i);
                    }
                    
                    const randIdx = parseInt(Math.random() * ids.length);

                    // alert(ids)
                    // alert(randIdx)
                    // alert(insVal)

                    this.board[ids[randIdx]] = insVal;

                    this.render(this.board);
                },

                // rotateCC(board, num) {
                //     num = parseInt(num) || 1;
                //     const ret = Array(this.DIM * this.DIM).fill(null);

                //     for (let j = 0; j < num; j++) {
                //         for (let i = 0; i < board.length; i++) {
                //             const row = Math.floor(i / 4) + 1;
                //         }
                //     }
                // },

                // shift(dir) {
                    
                // },

                mergeAll(dir) {
                    if (!Object.keys(moveDirections).includes(dir)) return;

                    // pass
                },

                render(board) {
                    if (!this.boardElem) return;
                    
                    this.boardElem.innerHTML = "";
                    
                    for (let i = 0; i < board.length; i++) {
                        const div = document.createElement("div");
                        div.classList.add("tile");
                        div.id = "tile-" + i;
    
                        const p = document.createElement("span");
                        // p.innerText = board[i] || "";
                        p.innerText = i;
    
                        div.appendChild(p);
                        this.boardElem.appendChild(div);
                    }
                }
            };

            game.init();
            game.spawnTile();
            game.spawnTile();
        </script>
    </body>
</html>
